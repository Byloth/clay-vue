name: NPM release
on:
  release:
    types: [published]

jobs:
  artifact-build:
    name: Artifact
    uses: ./.github/workflows/template-build.yml
    with:
      artifact: package

  publish:
    name: Publish on NPM
    needs: artifact-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Downloading the artifact
        uses: actions/download-artifact@v8
        with:
          name: byloth-clay_vue-package

      - name: Configuring Node.js 24 (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Updating npm to the latest version
        run: npm install -g npm@latest

      - if: ${{ github.event.release.prerelease == true }}
        name: Publishing pre-release package
        run: npm publish --access public --ignore-scripts --tag next
      - if: ${{ github.event.release.prerelease == false }}
        name: Publishing latest package
        run: npm publish --access public --ignore-scripts
